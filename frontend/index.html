<!DOCTYPE html>
<html lang="en" data-variant="calm" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Dictionary Management System</title>

    <!-- Design handoff fonts: Inter (UI) + JetBrains Mono (identifiers, types) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme + density before React mounts to prevent FOUC.
      (function() {
        var root = document.documentElement;
        var theme = localStorage.getItem('theme');
        if (theme === 'light' || theme === 'dark') {
          root.setAttribute('data-theme', theme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          root.setAttribute('data-theme', 'dark');
        }
        var density = localStorage.getItem('sdd-density');
        if (density === 'comfortable' || density === 'compact' || density === 'dense') {
          root.setAttribute('data-density', density);
        } else {
          root.setAttribute('data-density', 'comfortable');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
