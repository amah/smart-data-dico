<!DOCTYPE html>
<html lang="en" data-variant="calm" data-theme="light">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Dictionary Management System</title>

  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme + density + variant before React mounts to prevent FOUC.
      (function() {
        var root = document.documentElement;
        var variant = localStorage.getItem('sdd-variant');
        if (variant === 'calm' || variant === 'bold') {
          root.setAttribute('data-variant', variant);
        }
        var theme = localStorage.getItem('theme');
        if (theme === 'light' || theme === 'dark') {
          root.setAttribute('data-theme', theme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          root.setAttribute('data-theme', 'dark');
        }
        var density = localStorage.getItem('sdd-density');
        if (density === 'comfortable' || density === 'compact' || density === 'dense') {
          root.setAttribute('data-density', density);
        } else {
          root.setAttribute('data-density', 'comfortable');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
