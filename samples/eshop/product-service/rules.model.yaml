rules:
  - uuid: 9a2b4c5d-7e8f-4a1b-9c3d-fedcba987654
    name: product-discontinued-cannot-be-featured
    description: |-
      ## Discontinued products cannot be featured on the homepage

      A `Product` with `status = discontinued` must not appear on the
      homepage carousel — i.e. its `featured` flag must be false.
      Cross-attribute invariant; not expressible as either attribute
      validation or a database constraint.
    severity: warning
    enforcement: save
    scope: package
    targets:
      - kind: entity
        uuid: product-service
    packageName: product-service
    tags:
      - merchandising
      - data-consistency
    createdAt: 2026-04-09T00:00:00.000Z
    updatedAt: 2026-04-09T00:00:00.000Z
