id: profile-1
name: Profile
description: User profile containing additional user information
microservice: user-service
version: 1.0.0
attributes:
  - name: id
    description: Unique identifier for the profile
    type: string
    required: true
    unique: true
    metadata:
      isPrimaryKey: true
    uuid: c3bf9f61-dfa3-4a8e-9c36-7f6551487e24
  - name: userId
    description: Reference to the user this profile belongs to
    type: string
    required: true
    unique: true
    metadata:
      isForeignKey: true
    uuid: 14878839-27c3-40a7-a902-4b220f00623c
  - name: bio
    description: User's biography or description
    type: string
    required: false
    maxLength: 1000
    uuid: 18037c20-bef0-4e07-bcdf-acd95f6b2b26
  - name: avatarUrl
    description: URL to the user's avatar image
    type: string
    required: false
    format: uri
    uuid: 2bd30983-fef8-4a87-a885-aaac2733b4d5
  - name: phoneNumber
    description: User's phone number
    type: string
    required: false
    pattern: ^\+?[0-9]{10,15}$
    examples:
      - "+1234567890"
    uuid: 39528536-3369-4bd2-8e1f-23a3cdffea8a
  - name: address
    description: User's address
    type: object
    required: false
    properties:
      street:
        name: street
        description: Street address
        type: string
        required: true
        uuid: 94da651e-f49a-4a23-b563-fce1201e461c
      city:
        name: city
        description: City
        type: string
        required: true
        uuid: c53ec397-4333-4bdb-9572-14439d05082b
      state:
        name: state
        description: State or province
        type: string
        required: true
        uuid: e8c38a81-fc9b-44bd-8826-117dc566cf4a
      postalCode:
        name: postalCode
        description: Postal or ZIP code
        type: string
        required: true
        uuid: 4c68f45c-5d1c-4ebb-a500-ccee6a8a92ac
      country:
        name: country
        description: Country
        type: string
        required: true
        uuid: 7f91fd4e-a87d-4649-992d-b5381b34c2ac
    uuid: d9e2b381-33b7-4e8d-bcff-4b8b8d0bc9ad
  - name: preferences
    description: User preferences
    type: object
    required: false
    properties:
      theme:
        name: theme
        description: UI theme preference
        type: enum
        required: false
        enumValues:
          - LIGHT
          - DARK
          - SYSTEM
        defaultValue: SYSTEM
        uuid: eb57dac2-6875-48b8-9f0e-8d7c4416134b
      emailNotifications:
        name: emailNotifications
        description: Whether to send email notifications
        type: boolean
        required: false
        defaultValue: true
        uuid: 8111891c-1c7f-4986-bd15-08bee9ae3621
    uuid: 3da84948-ec60-4c3a-80c1-e13bf61fd048
  - name: createdAt
    description: Timestamp when the profile was created
    type: datetime
    required: true
    uuid: 058f7020-bcdd-4a96-bc8e-02e5ee558e05
  - name: updatedAt
    description: Timestamp when the profile was last updated
    type: datetime
    required: true
    uuid: a84b8eea-1813-404a-94c9-534aa8d59361
relationships:
  - name: user
    description: User that owns this profile
    type: belongsTo
    target: user-service.User
    inverseName: profile
    required: true
    foreignKey: userId
    uuid: 2d668133-04b2-4ef7-9893-6bc7664cae3c
uuid: 7e076ecf-e514-46e0-b08c-0d083632e99f
