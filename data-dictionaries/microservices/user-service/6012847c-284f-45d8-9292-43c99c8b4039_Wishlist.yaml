id: wishlist-1
name: Wishlist
description: User wishlist for saving favorite products
microservice: user-service
version: 1.0.0
attributes:
  - name: id
    description: Unique identifier for the wishlist entry
    type: string
    required: true
    unique: true
    metadata:
      - name: isPrimaryKey
        value: true
    uuid: bb587c3d-80b0-4a28-8f30-141be06ed1ba
  - name: userId
    description: ID of the user who owns the wishlist
    type: string
    required: true
    metadata:
      - name: isForeignKey
        value: true
    uuid: 03a7cfe7-0b81-477a-bbe6-0126773e26cc
  - name: productId
    description: ID of the product in the wishlist
    type: string
    required: true
    metadata:
      - name: isForeignKey
        value: true
    uuid: 6ee3aab9-e085-4f52-83d6-08d177243be2
  - name: notes
    description: Personal notes about the product
    type: string
    required: false
    uuid: 61c7f0ca-657b-4af8-b14b-72aeae407219
    validation:
      maxLength: 500
  - name: priority
    description: Priority level for the wishlist item
    type: enum
    required: true
    defaultValue: MEDIUM
    uuid: 85b903ce-e02a-4ef2-9bf0-54d2c45e8a59
    validation:
      enumValues:
        - LOW
        - MEDIUM
        - HIGH
  - name: isPublic
    description: Whether this wishlist item is visible to others
    type: boolean
    required: true
    defaultValue: false
    uuid: 42eb6739-ad93-4c67-8112-6d1d0fb5f775
  - name: createdAt
    description: Timestamp when the item was added to wishlist
    type: datetime
    required: true
    uuid: 549f88cf-0cae-405e-8d5c-a9b8249f746a
  - name: updatedAt
    description: Timestamp when the wishlist item was last updated
    type: datetime
    required: true
    uuid: f264ccf9-b851-435a-9324-770d83a46143
relationships:
  - name: user
    description: User who owns this wishlist item
    type: belongsTo
    target: user-service.User
    inverseName: wishlistItems
    required: true
    foreignKey: userId
    uuid: 8a4c550e-0097-4605-97fe-b82095758e31
  - name: product
    description: Product in the wishlist
    type: belongsTo
    target: product-service.Product
    inverseName: wishlistItems
    required: true
    foreignKey: productId
    uuid: 67f3f633-eb70-4c5a-8b91-188d82021916
uuid: 6012847c-284f-45d8-9292-43c99c8b4039
