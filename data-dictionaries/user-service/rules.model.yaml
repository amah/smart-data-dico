rules:
  - uuid: 7b1f2a3c-9d4e-4f5a-8b6c-1234567890ab
    name: user-active-requires-email-verified
    description: |-
      ## Active users must have a verified email

      A `User` with `active = true` must have completed email verification.
      Captured here as a functional rule because it crosses two attributes
      and depends on a process step (the verification flow), so it cannot
      be expressed as attribute validation or a database constraint.
    severity: error
    enforcement: process
    scope: package
    targets:
      - kind: entity
        uuid: user-service
    packageName: user-service
    metadata:
      - name: process-stage-field
        value: lifecycle-stage
      - name: process-stage-value
        value: activated
    tags:
      - identity
      - compliance
    createdAt: 2026-04-09T00:00:00.000Z
    updatedAt: 2026-04-09T00:00:00.000Z
